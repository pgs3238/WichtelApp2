//New version due to new plugin 7.1.0
node {
    // Version of node to use.
    version = '20.16.0'

    // If true, it will download node using above parameters.
    download = true

    // Das Plugin arbeitet jetzt standardmäßig mit dem Projekt-Root.
    // Falls deine package.json nicht im Root liegt, sondern unter src/main/frontend,
    // kannst du das hier definieren:
    nodeProjectDir = file("${project.projectDir}/src/main/frontend")
}

task npmInstallDependencies(type: NpmTask) {
    dependsOn 'npmSetup'
    execOverrides {
        it.ignoreExitValue = true
        it.workingDir = 'src/main/frontend'
    }
    //args = ['install']
    // "legacy-peer-deps" should be removed when frontend has been renewed
    // - currently needed as Frontend was built with Node Version 18.12.1
    args = ['install', '--legacy-peer-deps']
}

task npmBuild(type: NpmTask) {
    dependsOn 'npmInstallDependencies'
    execOverrides {
//        it.ignoreExitValue = true
        it.workingDir = 'src/main/frontend'
    }
    args = ['run', 'build']
}

task copyFrontendToBuild(type: Copy) {
    dependsOn 'npmBuild'
    from "$projectDir/src/main/frontend/build/"
//    include "*"
    into "$buildDir/resources/main/META-INF/resources"
}

processResources {
    dependsOn 'copyFrontendToBuild'
}





