plugins {
    id 'java'
    id 'io.quarkus' version '3.33.1'
    id "com.github.node-gradle.node" version "7.1.0"
    id("org.openrewrite.rewrite") version "6.24.0"
}


repositories {
    mavenCentral()
    mavenLocal()
}

rewrite {
    activeRecipe("org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta")
}

